services:
  ollama:
    image: ollama/ollama:latest
    container_name: infrarag-ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: infrarag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: infrarag-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./docs:/docs
      - backend_data:/app/data
      - hf_cache:/root/.cache/huggingface
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: infrarag_docs
      EMBED_MODEL: nomic-embed-text
      CHAT_MODEL: llama3.2:3b

      PLANNER_ENABLED: "true"
      PLANNER_TIMEOUT_SECONDS: 45
      PLANNER_NUM_PREDICT: 220
      FOLLOWUP_RESOLVER_ENABLED: "true"
      FOLLOWUP_RESOLVER_TIMEOUT_SECONDS: 35
      FOLLOWUP_RESOLVER_NUM_PREDICT: 260

      DOC_SUMMARY_BATCH_SIZE: 4
      DOC_SUMMARY_MAP_NUM_PREDICT: 700
      DOC_SUMMARY_REDUCE_NUM_PREDICT: 1800

      VERIFY_COMPLEX_ANSWERS: "true"
      VERIFIER_TIMEOUT_SECONDS: 90
      VERIFIER_NUM_PREDICT: 800
      VERIFIER_MAX_CONTEXT_CHARS: 9000
      VERIFIER_MAX_ANSWER_CHARS: 7000

      METADATA_DB_PATH: /app/data/infrarag.db
      UPLOAD_DIR: /app/data/uploads
      REPOS_DIR: /app/data/repos
    depends_on:
      - ollama
      - qdrant
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: nginx:alpine
    container_name: infrarag-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: infrarag-proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: infrarag-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: infrarag-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  ollama_data:
  qdrant_data:
  grafana_data:
  backend_data:
  hf_cache:
