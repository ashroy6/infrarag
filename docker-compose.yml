services:
  ollama:
    image: ollama/ollama:latest
    container_name: infrarag-ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: infrarag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: infrarag-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./docs:/docs
      - backend_data:/app/data
      - hf_cache:/root/.cache/huggingface
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: infrarag_docs
      EMBED_MODEL: nomic-embed-text
      CHAT_MODEL: llama3.2:3b
      METADATA_DB_PATH: /app/data/infrarag.db
      UPLOAD_DIR: /app/data/uploads
      REPOS_DIR: /app/data/repos
      HF_HOME: /root/.cache/huggingface
      TRANSFORMERS_CACHE: /root/.cache/huggingface
      NORMAL_QA_LIMIT: 6
      LONG_EXPLANATION_LIMIT: 10
      REPO_EXPLANATION_LIMIT: 10
      INCIDENT_RUNBOOK_LIMIT: 8
      RERANKER_ENABLED: "true"
      RERANKER_MODEL: BAAI/bge-reranker-base
      RERANKER_BATCH_SIZE: 8
      RERANKER_MAX_TEXT_CHARS: 1800
    depends_on:
      - ollama
      - qdrant
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: nginx:alpine
    container_name: infrarag-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: infrarag-proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: infrarag-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: infrarag-grafana
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  ollama_data:
  qdrant_data:
  grafana_data:
  backend_data:
  hf_cache:
