<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InfraRAG</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: 48px auto;
      padding: 0 20px;
      background: #fafafa;
      color: #222;
      font-size: 19px;
      line-height: 1.6;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2.4rem;
    }

    p.subtitle {
      margin-top: 0;
      margin-bottom: 28px;
      color: #555;
      font-size: 1.15rem;
    }

    .topbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .topbar a {
      text-decoration: none;
      background: #111827;
      color: white;
      padding: 10px 14px;
      border-radius: 8px;
      display: inline-block;
      font-size: 16px;
    }

    .topbar a:hover {
      background: #1f2937;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .row {
      display: flex;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      flex: 1;
      min-width: 300px;
      padding: 12px;
      font-size: 19px;
    }

    input[type="file"] {
      flex: 1;
      min-width: 300px;
      padding: 10px;
      font-size: 17px;
      background: #fff;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    button {
      padding: 12px 18px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
      background: #111827;
      color: white;
      font-size: 17px;
    }

    button:hover {
      background: #1f2937;
    }

    pre {
      background: #f4f4f4;
      padding: 18px;
      border-radius: 8px;
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-x: auto;
      min-height: 140px;
      font-size: 17px;
      line-height: 1.55;
    }

    .status {
      font-size: 16px;
      color: #444;
      margin-top: 10px;
    }

    .label {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 10px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="/admin.html">Open Admin UI</a>
  </div>

  <h1>InfraRAG</h1>
  <p class="subtitle">Ask questions over your DevOps, Terraform, AWS, and engineering docs. You can also upload a file and ingest it.</p>

  <div class="card">
    <label class="label" for="question">Ask a question</label>
    <div class="row">
      <input id="question" type="text" placeholder="Ask a DevOps / Terraform / AWS question" />
      <button onclick="askQuestion()">Ask</button>
    </div>
  </div>

  <div class="card">
    <label class="label" for="fileInput">Upload and ingest a file</label>
    <div class="row">
      <input id="fileInput" type="file" />
      <button onclick="uploadFile()">Upload</button>
    </div>
    <div id="uploadStatus" class="status">No file uploaded yet.</div>
  </div>

  <div class="card">
    <label class="label">Output</label>
    <pre id="output">Response will appear here...</pre>
  </div>

  <script>
    async function askQuestion() {
      const q = document.getElementById("question").value.trim();
      const output = document.getElementById("output");

      if (!q) {
        output.textContent = "Please enter a question.";
        return;
      }

      output.textContent = "Loading...";

      try {
        const res = await fetch(`/api/ask?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        output.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        output.textContent = "Request failed: " + err.message;
      }
    }

    async function uploadFile() {
      const fileInput = document.getElementById("fileInput");
      const uploadStatus = document.getElementById("uploadStatus");
      const output = document.getElementById("output");

      if (!fileInput.files || fileInput.files.length === 0) {
        uploadStatus.textContent = "Please choose a file first.";
        return;
      }

      const file = fileInput.files[0];
      const formData = new FormData();
      formData.append("file", file);

      uploadStatus.textContent = `Uploading ${file.name}...`;
      output.textContent = "Processing upload...";

      try {
        const res = await fetch("/api/upload", {
          method: "POST",
          body: formData
        });

        const data = await res.json();

        if (!res.ok) {
          uploadStatus.textContent = "Upload failed.";
          output.textContent = JSON.stringify(data, null, 2);
          return;
        }

        uploadStatus.textContent = `Upload complete: ${file.name}`;
        output.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        uploadStatus.textContent = "Upload failed.";
        output.textContent = "Upload request failed: " + err.message;
      }
    }
  </script>
</body>
</html>
